<style>
  :root {
    --bg: #080808;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --gold: #A0782A;
    --gold-light: #C4973A;
    --white: #FFFFFF;
    --grey: #555555;
    --grey2: #888888;
    --line: rgba(160,120,42,0.2);
    --disp: 'Oswald', sans-serif;
    --body: 'Inter', sans-serif;
    --sidebar-w: 280px;
    --header-h: 56px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--white); font-family: var(--body); -webkit-font-smoothing: antialiased; }

  /* -- HEADER -- */
  .header {
    position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
    background: var(--bg); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; z-index: 100;
  }
  .header .brand {
    display: flex; align-items: center; gap: 12px;
    font-family: var(--disp); font-weight: 700; font-size: 16px;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--white);
  }
  .header .brand .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
  }
  .header .meta {
    font-size: 11px; color: var(--grey2); letter-spacing: 0.12em;
    text-transform: uppercase; font-family: var(--disp);
  }
  .header .meta span { color: var(--gold); font-weight: 600; }
  .header .mobile-toggle {
    display: none; background: none; border: 1px solid var(--line);
    color: var(--white); padding: 6px 12px; font-family: var(--disp);
    font-size: 12px; letter-spacing: 0.1em; cursor: pointer;
    text-transform: uppercase;
  }

  /* -- LAYOUT -- */
  .layout {
    position: fixed; top: var(--header-h); left: 0; right: 0; bottom: 0;
    display: grid; grid-template-columns: var(--sidebar-w) 1fr;
  }

  /* -- SIDEBAR -- */
  .sidebar {
    background: var(--bg2); border-right: 1px solid var(--line);
    overflow-y: auto; overflow-x: hidden;
    scrollbar-width: thin; scrollbar-color: var(--gold) var(--bg2);
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-track { background: var(--bg2); }
  .sidebar::-webkit-scrollbar-thumb { background: var(--gold); }

  .sidebar-section {
    padding: 16px 0 8px;
    border-bottom: 1px solid var(--line);
  }
  .sidebar-section-label {
    font-family: var(--disp); font-size: 9px; font-weight: 600;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--grey); padding: 0 18px; margin-bottom: 8px;
  }

  .style-btn {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 10px 18px; background: none; border: none;
    cursor: pointer; text-align: left; transition: background .15s;
    border-left: 2px solid transparent;
  }
  .style-btn:hover { background: var(--bg3); }
  .style-btn.active {
    background: var(--bg3); border-left-color: var(--gold);
  }
  .style-btn .num {
    font-family: var(--disp); font-weight: 700; font-size: 18px;
    color: var(--gold); line-height: 1; min-width: 32px;
    letter-spacing: -0.02em;
  }
  .style-btn.extra .num { font-size: 12px; letter-spacing: 0.06em; }
  .style-btn .info { flex: 1; min-width: 0; }
  .style-btn .name {
    font-family: var(--disp); font-size: 13px; font-weight: 600;
    color: var(--white); text-transform: uppercase; letter-spacing: 0.04em;
    line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .style-btn .target {
    font-size: 10px; color: var(--grey2); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-weight: 400;
  }
  .style-btn .arrow {
    font-size: 10px; color: var(--grey); transition: color .15s;
    flex-shrink: 0;
  }
  .style-btn.active .arrow, .style-btn:hover .arrow { color: var(--gold); }

  /* -- MAIN AREA -- */
  .main {
    position: relative; background: var(--bg3);
    display: flex; flex-direction: column;
  }

  /* -- TOOLBAR -- */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 44px; background: var(--bg2);
    border-bottom: 1px solid var(--line); flex-shrink: 0;
  }
  .toolbar .style-info {
    display: flex; align-items: center; gap: 14px;
  }
  .toolbar .style-num {
    font-family: var(--disp); font-weight: 700; font-size: 22px;
    color: var(--gold); letter-spacing: -0.02em; line-height: 1;
  }
  .toolbar .style-name {
    font-family: var(--disp); font-size: 14px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--white);
  }
  .toolbar .style-target {
    font-size: 11px; color: var(--grey2); margin-left: 4px;
  }
  .viewport-btns {
    display: flex; gap: 6px; align-items: center;
  }
  .vp-btn {
    background: none; border: 1px solid var(--line); color: var(--grey2);
    padding: 5px 10px; cursor: pointer; font-family: var(--disp);
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    transition: all .15s; display: flex; align-items: center; gap: 5px;
  }
  .vp-btn:hover, .vp-btn.active {
    border-color: var(--gold); color: var(--gold);
  }
  .vp-btn svg { width: 12px; height: 12px; }

  /* -- IFRAME AREA -- */
  .iframe-wrap {
    flex: 1; overflow: hidden; display: flex;
    align-items: center; justify-content: center;
    background: #222; transition: all .25s;
  }
  .iframe-wrap.desktop { padding: 0; }
  .iframe-wrap.tablet  { padding: 20px; background: #1a1a1a; }
  .iframe-wrap.mobile  { padding: 20px; background: #1a1a1a; }

  .iframe-device {
    position: relative; background: var(--white);
    transition: all .25s; overflow: hidden;
    width: 100%; height: 100%;
  }
  .iframe-wrap.tablet .iframe-device {
    width: 768px; height: 100%;
    max-height: calc(100vh - var(--header-h) - 44px - 40px);
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
  }
  .iframe-wrap.mobile .iframe-device {
    width: 390px; height: 100%;
    max-height: calc(100vh - var(--header-h) - 44px - 40px);
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
  }

  /* iframe occupa sempre 1280px interni, poi scala */
  .iframe-device iframe {
    border: none; display: block;
    width: 1280px; height: 100%;
    transform-origin: top left;
  }

  /* -- LOADING -- */
  .loader {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: var(--bg3); z-index: 10; transition: opacity .3s;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .loader-num {
    font-family: var(--disp); font-weight: 700; font-size: 80px;
    color: var(--gold); opacity: 0.15; line-height: 1; letter-spacing: -0.04em;
  }
  .loader-bar {
    width: 120px; height: 2px; background: var(--bg2); overflow: hidden; border-radius: 2px;
  }
  .loader-bar-inner {
    height: 100%; background: var(--gold);
    animation: loadbar 1.2s ease-in-out infinite;
  }
  @keyframes loadbar {
    0%   { width: 0%;  margin-left: 0; }
    50%  { width: 60%; margin-left: 20%; }
    100% { width: 0%;  margin-left: 100%; }
  }
  .loader-label {
    font-size: 10px; color: var(--grey); letter-spacing: 0.2em;
    text-transform: uppercase; font-family: var(--disp);
  }

  /* -- PALETTE BAR -- */
  .palette-bar {
    display: flex; height: 6px; flex-shrink: 0;
  }
  .palette-bar .swatch { flex: 1; }

  /* -- MOBILE RESPONSIVE -- */
  @media (max-width: 768px) {
    :root { --sidebar-w: 100%; }
    .layout { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed; top: var(--header-h); left: 0; right: 0; bottom: 0;
      z-index: 50; transform: translateX(-100%); transition: transform .25s;
    }
    .sidebar.open { transform: translateX(0); }
    .main { grid-column: 1; }
    .header .mobile-toggle { display: flex; }
    .header .meta { display: none; }
    .toolbar .style-target { display: none; }
    .vp-btn .vp-label { display: none; }
  }
</style>

  const iframe = document.getElementById('preview');
  const device = document.getElementById('iframe-device');
  const DESIGN_W = 1280; // larghezza di progetto dei mockup

  const availW = device.offsetWidth;
  const scale = availW / DESIGN_W;
  iframe.style.transform = 'scale(' + scale + ')';
  iframe.style.transformOrigin = 'top left';
  iframe.style.width = DESIGN_W + 'px';
  iframe.style.height = (device.offsetHeight / scale) + 'px';
}

function loadStyle(btn) {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const file   = btn.dataset.file;
  const num    = btn.dataset.id;
  const name   = btn.dataset.name;
  const target = btn.dataset.target;
  const palette = btn.dataset.palette ? btn.dataset.palette.split(',') : [];

  document.getElementById('tb-num').textContent    = num;
  document.getElementById('tb-name').textContent   = name;
  document.getElementById('tb-target').textContent = target;

  const bar = document.getElementById('palette-bar');
  bar.innerHTML = palette.map(c => `<div class="swatch" style="background:${c.trim()}"></div>`).join('');

  const loader = document.getElementById('loader');
  document.getElementById('loader-num').textContent = num;
  loader.classList.remove('hidden');

  const iframe = document.getElementById('preview');
  iframe.onload = () => {
    loader.classList.add('hidden');
    scaleIframe();
  };
  iframe.src = BASE + file;

  document.getElementById('sidebar').classList.remove('open');
}

function setViewport(vp, btn) {
  document.querySelectorAll('.vp-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentViewport = vp;
  const wrap = document.getElementById('iframe-wrap');
  wrap.className = 'iframe-wrap ' + vp;
  // Ricalcola scala dopo transizione CSS (.25s)
  setTimeout(scaleIframe, 300);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

window.addEventListener('resize', scaleIframe);

window.addEventListener('DOMContentLoaded', () => {
  const first = document.querySelector('.style-btn.active');
  if (first) loadStyle(first);
});
</script>

</body>
</html>
